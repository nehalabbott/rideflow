services:

  postgres:
    image: postgres:17
    container_name: rideflow_postgres

    environment:
      POSTGRES_USER: rideflow
      POSTGRES_PASSWORD: rideflow
      POSTGRES_DB: rideflow

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:8

    container_name: rideflow_redis

    ports:
      - "6379:6379"

  adminer:
    image: adminer
    container_name: rideflow_adminer
    restart: always
    ports:
      - "8080:8080"
    depends_on:
      - postgres
volumes:
  postgres_data: